name: 🌻 Generate Sunflower Garden

on:
  schedule:
    # Runs every day at midnight UTC
    - cron: "0 0 * * *"
  workflow_dispatch:  # Also allow manual trigger from GitHub UI
  push:
    branches:
      - main  # Also regenerate on every push

jobs:
  build-garden:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Need write permission to commit the SVG back

    steps:
      - name: 🛎️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install Dependencies
        run: pip install requests

      - name: 🌻 Generate Sunflower Garden SVG
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python generate_garden.py

      - name: 📸 Verify SVG was created
        run: |
          ls -lh sunflower-garden.svg
          echo "SVG generated successfully!"

      - name: 🚀 Commit and Push SVG
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🌻 Daily garden update — bees have landed! [skip ci]"
          file_pattern: sunflower-garden.svg
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
